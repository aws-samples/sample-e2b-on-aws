AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  E2B Infrastructure CloudFormation Template - Deploys core infrastructure components for E2B platform
  including VPC, Terraform Bastion, IAM Roles, PostgreSQL Database, and S3 Buckets.

# ===================================================================================================
# Metadata - Organizes template parameters into logical groups in the CloudFormation console
# ===================================================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: VPC Configuration
        Parameters:
          - VpcBlock
          - PublicSubnet1Block
          - PublicSubnet2Block
          - PrivateSubnet1Block
          - PrivateSubnet2Block
          - PublicAccess
      - Label:
          default: E2B Environment
        Parameters:
          - Environment
      - Label:
          default: Architecture Configuration
        Parameters:
          - Architecture
      - Label:
          default: Client Cluster Configuration
        Parameters:
          - ClientInstanceType
      - Label:
          default: Domain Configuration
        Parameters:
          - BaseDomain
      - Label:
          default: SSH Key Configuration
        Parameters:
          - KeyName
      - Label:
          default: External Resources
        Parameters:
          - ExistingE2BBucketName
          - ExistingLokiBucketName
          - ExistingDBURL
          - ExistingRedisEndpoint
          - ExistingCertificateArn
      - Label:
          default: Custom Script Configuration
        Parameters:
          - CustomScriptUrl

# ===================================================================================================
# Parameters - Input values required for the E2B infrastructure deployment
# ===================================================================================================
Parameters:
  # E2B Environment Configuration
  Environment:
    Description: "E2B Environment"
    Type: String
    AllowedValues:
      - prod
      - dev
    Default: prod

  # Architecture Configuration - Choose CPU architecture
  Architecture:
    Description: "Choose between x86_64 (Intel/AMD compatible) and arm64 (AWS Graviton) processor architectures."
    Type: String
    AllowedValues:
      - x86_64
      - arm64

  # Client Cluster Configuration - Instance type for client nodes
  ClientInstanceType:
    Description: "Instance type for client cluster nodes (must support nested virtualization, e.g. *.metal). Leave empty to use architecture default (x86: c5.metal, arm64: c7g.metal)."
    Type: String
    Default: ""

  # Domain Configuration - Settings for SSL certificate and DNS
  BaseDomain:
    Type: String
    Description: >-
      Base domain name (e.g. domain.com or sub.domain.com).
      Wildcard certificate will be issued for *.{BaseDomain}
    AllowedPattern: '^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$'
    ConstraintDescription: Must be a valid domain (e.g. sub.domain.com)

  # VPC Configuration - Network address space for the entire infrastructure
  VpcBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: The CIDR range for the VPC. Must be a valid private (RFC 1918) CIDR range with sufficient IP addresses for all components.

  # Public Subnets - Network segments with internet access for load balancers and bastion hosts
  PublicSubnet1Block:
    Type: String
    Default: 10.0.0.0/20
    Description: CIDR block for public subnet in Availability Zone 1 (provides 4,096 IP addresses for internet-facing resources)
  PublicSubnet2Block:
    Type: String
    Default: 10.0.16.0/20
    Description: CIDR block for public subnet in Availability Zone 2 (provides 4,096 IP addresses for internet-facing resources)

  # Private Subnets - Isolated network segments for databases and application servers
  PrivateSubnet1Block:
    Type: String
    Default: 10.0.32.0/20
    Description: CIDR block for private subnet in Availability Zone 1 (provides 4,096 IP addresses for internal resources)
  PrivateSubnet2Block:
    Type: String
    Default: 10.0.48.0/20
    Description: CIDR block for private subnet in Availability Zone 2 (provides 4,096 IP addresses for internal resources)

  PublicAccess:
    Type: String
    Description: Specify whether public or private access to E2B
    AllowedValues:
      - Public
      - Private
    Default: Public

  # SSH Key Configuration - Used by Terraform for cluster EC2 instances
  KeyName:
    Description: EC2 Key Pair name for SSH access to cluster instances
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair in this region.

  # External Resources - Pre-existing resources passed in as parameters
  ExistingE2BBucketName:
    Type: String
    Description: "Name of pre-existing unified E2B S3 bucket"

  ExistingLokiBucketName:
    Type: String
    Description: "Name of pre-existing Loki storage S3 bucket"

  ExistingDBURL:
    Type: String
    NoEcho: true
    Description: "PostgreSQL connection string (postgresql://user:pass@host:port/dbname)"

  ExistingRedisEndpoint:
    Type: String
    Description: "Redis endpoint address (without port, e.g. xxx.serverless.use1.cache.amazonaws.com)"

  ExistingCertificateArn:
    Type: String
    Description: "ARN of existing ACM wildcard certificate"

  # Custom Script Configuration - Optional startup script for EC2 instances
  CustomScriptUrl:
    Type: String
    Default: ""
    Description: "(Optional) URL of a custom bash script to execute on EC2 instances after E2B services start. Supports S3 URLs (s3://bucket/script.sh) and HTTPS URLs."

# ===================================================================================================
# Conditions - Conditional logic for resource creation (none used in this template)
# ===================================================================================================
Conditions:
  IsX64: !Equals [!Ref Architecture, x86_64]
  HasCustomClientInstanceType: !Not [!Equals [!Ref ClientInstanceType, ""]]

# ===================================================================================================
# Resources - AWS resources to be provisioned for the E2B infrastructure
# ===================================================================================================
Resources:
  # ------------------------------------------------------------------------------------------------
  # VPC and Networking - Core network infrastructure for secure communication between components
  # ------------------------------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "vpc-${AWS::StackName}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  # Public Subnet in AZ1 - Network segment with direct internet access in first availability zone
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Metadata:
      Comment: Public subnet in first availability zone for internet-facing resources
    Properties:
      AvailabilityZone: !Select
        - "0"
        - !GetAZs
          Ref: AWS::Region
      CidrBlock: !Ref PublicSubnet1Block
      VpcId: !Ref VPC
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-1
        - Key: kubernetes.io/role/elb
          Value: "1"

  # Public Subnet in AZ2 - Network segment with direct internet access in second availability zone
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Metadata:
      Comment: Public subnet in second availability zone for internet-facing resources
    Properties:
      AvailabilityZone: !Select
        - "1"
        - !GetAZs
          Ref: AWS::Region
      CidrBlock: !Ref PublicSubnet2Block
      VpcId: !Ref VPC
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-2
        - Key: kubernetes.io/role/elb
          Value: "1"

  # Private Subnet in AZ1 - Isolated network segment in first availability zone for backend services
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Metadata:
      Comment: Private subnet in first availability zone for secure resources
    Properties:
      AvailabilityZone: !Select
        - "0"
        - !GetAZs
          Ref: AWS::Region
      CidrBlock: !Ref PrivateSubnet1Block
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-private-1
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  # Private Subnet in AZ2 - Isolated network segment in second availability zone for backend services
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Metadata:
      Comment: Private subnet in second availability zone for secure resources
    Properties:
      AvailabilityZone: !Select
        - "1"
        - !GetAZs
          Ref: AWS::Region
      CidrBlock: !Ref PrivateSubnet2Block
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-private-2
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  # Route Table for Public Subnets - Defines routing rules for internet-accessible subnets
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-route

  # Route Table for Private Subnets - Defines routing rules for internal-only subnets
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-private-route

  # Default Route to Internet Gateway - Enables outbound internet access for public subnets
  PublicRoute:
    DependsOn: VPCGatewayAttachment
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Elastic IP for NAT Gateway - Static public IP address for outbound internet traffic
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-eip"

  # NAT Gateway - Enables outbound internet access for instances in private subnets
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-gw"

  # Default Route to NAT Gateway - Enables outbound internet access for private subnets
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Associate Route Tables with Subnets - Links routing rules to appropriate network segments
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # S3 VPC Endpoint - Provides private access to S3 without traversing the public internet
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcId: !Ref VPC
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable

  # ------------------------------------------------------------------------------------------------
  # IAM - Identity and Access Management roles and policies for secure resource access
  # ------------------------------------------------------------------------------------------------
  EC2ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: E2BDeploymentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketAcl
                  - s3:PutBucketAcl
                  - s3:GetBucketCors
                  - s3:PutBucketCors
                  - s3:GetBucketWebsite
                  - s3:PutBucketWebsite
                  - s3:GetAccelerateConfiguration
                  - s3:PutAccelerateConfiguration
                  - s3:GetBucketRequestPayment
                  - s3:PutBucketRequestPayment
                  - s3:GetBucketLogging
                  - s3:PutBucketLogging
                  - s3:GetLifecycleConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:GetReplicationConfiguration
                  - s3:PutReplicationConfiguration
                  - s3:GetBucketObjectLockConfiguration
                  - s3:PutBucketObjectLockConfiguration
                  - s3:GetObjectTagging
                  - s3:PutObjectTagging
                Resource:
                  - "arn:aws:s3:::*e2b*"
                  - "arn:aws:s3:::*e2b*/*"
              - Sid: SecretsManagerAccess
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:UpdateSecret
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:*e2b*"
              - Sid: EC2PackerAccess
                Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:CopyImage
                  - ec2:CreateImage
                  - ec2:CreateKeypair
                  - ec2:CreateSecurityGroup
                  - ec2:CreateSnapshot
                  - ec2:CreateTags
                  - ec2:CreateVolume
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteKeyPair
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteSnapshot
                  - ec2:DeleteVolume
                  - ec2:DeleteLaunchTemplate
                  - ec2:DeleteNetworkInterface
                  - ec2:DeregisterImage
                  - ec2:DescribeImageAttribute
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeRegions
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSnapshots
                  - ec2:DescribeSubnets
                  - ec2:DescribeTags
                  - ec2:DescribeVolumes
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeVpcs
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DetachVolume
                  - ec2:GetPasswordData
                  - ec2:ModifyImageAttribute
                  - ec2:ModifyInstanceAttribute
                  - ec2:ModifySnapshotAttribute
                  - ec2:ModifyLaunchTemplate
                  - ec2:RegisterImage
                  - ec2:RunInstances
                  - ec2:StopInstances
                  - ec2:TerminateInstances
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                Resource: "*"
              - Sid: AutoScalingAndELB
                Effect: Allow
                Action:
                  - autoscaling:*
                  - elasticloadbalancing:*
                Resource: "*"
              - Sid: ECRAccess
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                  - ecr:DescribeImages
                  - ecr:TagResource
                Resource:
                  - "*"
                  - !Sub "arn:aws:ecr:*:${AWS::AccountId}:repository/e2b-*"
              - Sid: IAMAccess
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:ListRoles
                  - iam:UpdateRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:ListInstanceProfiles
                  - iam:ListInstanceProfilesForRole
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicies
                  - iam:ListPolicyVersions
                  - iam:ListAttachedRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRolePolicies
                  - iam:TagPolicy
                  - iam:UntagPolicy
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:instance-profile/*e2b*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/*e2b*"
              - Sid: IAMAttachAWSManagedPolicy
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                Condition:
                  ArnEquals:
                    iam:PolicyARN:
                      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
                      - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
                      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
                      - arn:aws:iam::aws:policy/AmazonEC2FullAccess
                      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
                      - arn:aws:iam::aws:policy/AmazonS3FullAccess
                      - arn:aws:iam::aws:policy/SecretsManagerReadWrite
                      - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - ec2.amazonaws.com
              - Sid: LogsAndMonitoring
                Effect: Allow
                Action:
                  - logs:*
                  - cloudwatch:*
                Resource: "*"
              - Sid: ElastiCacheAccess
                Effect: Allow
                Action:
                  - elasticache:DescribeCacheClusters
                  - elasticache:DescribeServerlessCaches
                Resource: "*"
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: "*"
              - Sid: SSMAccess
                Effect: Allow
                Action:
                  - ssm:GetParameter*
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DescribeParameters
                Resource: !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/*e2b*"
              - Sid: STSAccess
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
      Description: IAM role with complete permissions for E2B infrastructure deployment including Packer and Terraform

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2ServiceRole


# ===================================================================================================
# Outputs - Values exported after stack creation for reference by other stacks
# ===================================================================================================
Outputs:
  # Stack information
  CFNSTACKNAME:
    Description: CloudFormation stack name for reference in other templates
    Value: !Ref AWS::StackName
    Export:
      Name: CFNSTACKNAME

  # VPC outputs
  CFNVPCID:
    Description: VPC ID for the E2B infrastructure network
    Value: !Ref VPC
    Export:
      Name: CFNVPCID

  CFNVPCCIDR:
    Description: VPC CIDR Block defining the overall network address space
    Value: !Ref VpcBlock
    Export:
      Name: CFNVPCCIDR

  # Public Access Configuration
  CFNPUBLICACCESS:
    Description: Public or Private access configuration
    Value: !Ref PublicAccess
    Export:
      Name: CFNPUBLICACCESS

  # Subnet outputs
  CFNPRIVATESUBNET1:
    Description: Private Subnet ID in first availability zone for secure resources
    Value: !Ref PrivateSubnet1
    Export:
      Name: CFNPRIVATESUBNET1

  CFNPRIVATESUBNET2:
    Description: Private Subnet ID in second availability zone for secure resources
    Value: !Ref PrivateSubnet2
    Export:
      Name: CFNPRIVATESUBNET2

  CFNPUBLICSUBNET1:
    Description: Public Subnet ID in first availability zone for internet-facing resources
    Value: !Ref PublicSubnet1
    Export:
      Name: CFNPUBLICSUBNET1

  CFNPUBLICSUBNET2:
    Description: Public Subnet ID in second availability zone for internet-facing resources
    Value: !Ref PublicSubnet2
    Export:
      Name: CFNPUBLICSUBNET2

  # S3 bucket outputs
  CFNTERRAFORMBUCKET:
    Description: S3 bucket name for the unified E2B bucket
    Value: !Ref ExistingE2BBucketName
    Export:
      Name: CFNTERRAFORMBUCKET

  CFNLOKIBUCKET:
    Description: S3 bucket name for Loki log storage
    Value: !Ref ExistingLokiBucketName
    Export:
      Name: CFNLOKIBUCKET

  # SSH key output
  CFNSSHKEY:
    Description: EC2 SSH Key Name for cluster instance access
    Value: !Ref KeyName
    Export:
      Name: CFNSSHKEY

  # Database connection string
  CFNDBURL:
    Description: Complete PostgreSQL connection string for application configuration
    Value: !Ref ExistingDBURL
    Export:
      Name: CFNDBURL

  # Domain and certificate outputs
  CFNDOMAIN:
    Description: Base domain name for E2B services
    Value: !Ref BaseDomain
    Export:
      Name: CFNDOMAIN

  CFNCERTARN:
    Description: SSL Certificate ARN for HTTPS endpoints
    Value: !Ref ExistingCertificateArn
    Export:
      Name: CFNCERTARN

  # Redis output
  CFNREDISURL:
    Description: Redis endpoint address for application configuration
    Value: !Ref ExistingRedisEndpoint
    Export:
      Name: CFNREDISURL

  ENVIRONMENT:
    Description: E2B Environment
    Value: !Ref Environment
    Export:
      Name: CFNENVIRONMENT

  ARCHITECTURE:
    Description: E2B Cluster CPU Architecture
    Value: !Ref Architecture
    Export:
      Name: CFNARCHITECTURE

  CLIENTINSTANCETYPE:
    Description: Instance type for client cluster
    Value: !If
      - HasCustomClientInstanceType
      - !Ref ClientInstanceType
      - !If
        - IsX64
        - c5.metal
        - c7g.metal
    Export:
      Name: CFNCLIENTINSTANCETYPE

  REGION:
    Description: E2B Cluster Deployment Region
    Value: !Ref AWS::Region
    Export:
      Name: AWSREGION

  STACKNAME:
    Description: CloudFormation Stack Name
    Value: !Ref AWS::StackName
    Export:
      Name: AWSSTACKNAME

  CFNCustomScriptUrl:
    Description: Custom script URL for EC2 instances
    Value: !Ref CustomScriptUrl
    Export:
      Name: CFNCustomScriptUrl
