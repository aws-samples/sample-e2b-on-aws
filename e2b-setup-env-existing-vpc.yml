AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  E2B Infrastructure CloudFormation Template (Existing VPC) - Deploys core infrastructure components for E2B platform
  using existing VPC including IAM Roles and S3 VPC Endpoint. External resources (S3, RDS, Redis, Certificate) are passed in as parameters.

# ===================================================================================================
# Metadata - Organizes template parameters into logical groups in the CloudFormation console
# ===================================================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Existing VPC Configuration
        Parameters:
          - ExistingVpcId
          - ExistingPrivateSubnet1Id
          - ExistingPrivateSubnet2Id
          - ExistingPublicSubnet1Id
          - ExistingPublicSubnet2Id
          - PublicAccess
      - Label:
          default: E2B Environment
        Parameters:
          - Environment
      - Label:
          default: Architecture Configuration
        Parameters:
          - Architecture
          - ClientInstanceType
      - Label:
          default: Client Cluster Configuration
        Parameters:
          - ClientInstanceType
      - Label:
          default: Domain Configuration
        Parameters:
          - BaseDomain
      - Label:
          default: SSH Key Configuration
        Parameters:
          - KeyName
      - Label:
          default: External Resources
        Parameters:
          - ExistingE2BBucketName
          - ExistingLokiBucketName
          - ExistingDBURL
          - ExistingRedisEndpoint
          - ExistingCertificateArn
      - Label:
          default: Custom Script Configuration
        Parameters:
          - CustomScriptUrl

# ===================================================================================================
# Parameters - Input values required for the E2B infrastructure deployment
# ===================================================================================================
Parameters:
  # E2B Environment Configuration
  Environment:
    Description: "E2B Environment"
    Type: String
    AllowedValues:
      - prod
      - dev
    Default: prod

  # Architecture Configuration - Choose CPU architecture
  Architecture:
    Description: "Choose between x86_64 (Intel/AMD compatible) and arm64 (AWS Graviton) processor architectures."
    Type: String
    AllowedValues:
      - x86_64
      - arm64

  # Client Cluster Configuration - Instance type for client nodes
  ClientInstanceType:
    Description: "Instance type for client cluster nodes (must support nested virtualization, e.g. *.metal). Leave empty to use architecture default (x86: c5.metal, arm64: c7g.metal)."
    Type: String
    Default: ""

  # Domain Configuration - Settings for SSL certificate and DNS
  BaseDomain:
    Type: String
    Description: >-
      Base domain name (e.g. domain.com or sub.domain.com).
    AllowedPattern: '^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$'
    ConstraintDescription: Must be a valid domain (e.g. sub.domain.com)

  # Existing VPC Configuration
  ExistingVpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the existing VPC where E2B infrastructure will be deployed

  ExistingPrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: ID of existing private subnet in first availability zone

  ExistingPrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: ID of existing private subnet in second availability zone

  ExistingPublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: ID of existing public subnet in first availability zone(not available in private access mode)

  ExistingPublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: ID of existing public subnet in second availability zone(not available in private access mode)

  PublicAccess:
    Type: String
    Description: Specify whether public or private access to E2B
    AllowedValues:
      - public
      - private
    Default: public

  # SSH Key Configuration - Used by Terraform for cluster EC2 instances
  KeyName:
    Description: EC2 Key Pair name for SSH access to cluster instances
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair in this region.

  # External Resources - Pre-existing resources passed in as parameters
  ExistingE2BBucketName:
    Type: String
    Description: "Name of pre-existing unified E2B S3 bucket"

  ExistingLokiBucketName:
    Type: String
    Description: "Name of pre-existing Loki storage S3 bucket"

  ExistingDBURL:
    Type: String
    NoEcho: true
    Description: "PostgreSQL connection string (postgresql://user:pass@host:port/dbname)"

  ExistingRedisEndpoint:
    Type: String
    Description: "Redis endpoint address (without port, e.g. xxx.serverless.use1.cache.amazonaws.com)"

  ExistingCertificateArn:
    Type: String
    Description: "ARN of existing ACM wildcard certificate"

  # Custom Script Configuration - Optional startup script for EC2 instances
  CustomScriptUrl:
    Type: String
    Default: ""
    Description: "(Optional) URL of a custom bash script to execute on EC2 instances after E2B services start. Supports S3 URLs (s3://bucket/script.sh) and HTTPS URLs."

# ===================================================================================================
# Conditions - Conditional logic for resource creation
# ===================================================================================================
Conditions:
  IsX64: !Equals [!Ref Architecture, x86_64]
  IsArm64: !Equals [!Ref Architecture, arm64]
  IsProd: !Equals [!Ref Environment, prod]
  HasCustomClientInstanceType: !Not [!Equals [!Ref ClientInstanceType, ""]]

# ===================================================================================================
# Resources - AWS resources to be provisioned for the E2B infrastructure
# ===================================================================================================
Resources:
  # ------------------------------------------------------------------------------------------------
  # VPC CIDR Lookup - Custom resource to automatically retrieve VPC CIDR block
  # ------------------------------------------------------------------------------------------------
  VpcLookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: VpcDescribePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                Resource: "*"

  VpcLookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-vpc-lookup"
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt VpcLookupRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  ec2 = boto3.client('ec2')
                  vpc_id = event['ResourceProperties']['VpcId']

                  response = ec2.describe_vpcs(VpcIds=[vpc_id])

                  if not response['Vpcs']:
                      raise Exception(f'VPC {vpc_id} not found')

                  vpc = response['Vpcs'][0]
                  cidr_block = vpc['CidrBlock']

                  response_data = {'CidrBlock': cidr_block}
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  print(f'Error: {str(e)}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  VpcCidrLookup:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt VpcLookupFunction.Arn
      VpcId: !Ref ExistingVpcId

  # ------------------------------------------------------------------------------------------------
  # VPC Endpoint - Provides private access to S3 without traversing the public internet
  # ------------------------------------------------------------------------------------------------
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcId: !Ref ExistingVpcId
      VpcEndpointType: Gateway
      # Note: You may need to specify existing route table IDs for your VPC
      # RouteTableIds:
      #   - existing-route-table-id-1
      #   - existing-route-table-id-2

  # ------------------------------------------------------------------------------------------------
  # IAM - Identity and Access Management roles and policies for secure resource access
  # ------------------------------------------------------------------------------------------------
  EC2ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: E2BDeploymentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketAcl
                  - s3:PutBucketAcl
                  - s3:GetBucketCors
                  - s3:PutBucketCors
                  - s3:GetBucketWebsite
                  - s3:PutBucketWebsite
                  - s3:GetAccelerateConfiguration
                  - s3:PutAccelerateConfiguration
                  - s3:GetBucketRequestPayment
                  - s3:PutBucketRequestPayment
                  - s3:GetBucketLogging
                  - s3:PutBucketLogging
                  - s3:GetLifecycleConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:GetReplicationConfiguration
                  - s3:PutReplicationConfiguration
                  - s3:GetBucketObjectLockConfiguration
                  - s3:PutBucketObjectLockConfiguration
                  - s3:GetObjectTagging
                  - s3:PutObjectTagging
                Resource:
                  - "arn:aws:s3:::*e2b*"
                  - "arn:aws:s3:::*e2b*/*"
              - Sid: SecretsManagerAccess
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:UpdateSecret
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:*e2b*"
              - Sid: EC2PackerAccess
                Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:CopyImage
                  - ec2:CreateImage
                  - ec2:CreateKeypair
                  - ec2:CreateSecurityGroup
                  - ec2:CreateSnapshot
                  - ec2:CreateTags
                  - ec2:CreateVolume
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteKeyPair
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteSnapshot
                  - ec2:DeleteVolume
                  - ec2:DeleteLaunchTemplate
                  - ec2:DeleteNetworkInterface
                  - ec2:DeregisterImage
                  - ec2:DescribeImageAttribute
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeRegions
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSnapshots
                  - ec2:DescribeSubnets
                  - ec2:DescribeTags
                  - ec2:DescribeVolumes
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeVpcs
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DetachVolume
                  - ec2:GetPasswordData
                  - ec2:ModifyImageAttribute
                  - ec2:ModifyInstanceAttribute
                  - ec2:ModifySnapshotAttribute
                  - ec2:ModifyLaunchTemplate
                  - ec2:RegisterImage
                  - ec2:RunInstances
                  - ec2:StopInstances
                  - ec2:TerminateInstances
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                Resource: "*"
              - Sid: AutoScalingAndELB
                Effect: Allow
                Action:
                  - autoscaling:*
                  - elasticloadbalancing:*
                Resource: "*"
              - Sid: ECRAccess
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                  - ecr:DescribeImages
                  - ecr:TagResource
                Resource:
                  - "*"
                  - !Sub "arn:aws:ecr:*:${AWS::AccountId}:repository/e2b-*"
              - Sid: IAMAccess
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:ListRoles
                  - iam:UpdateRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:ListInstanceProfiles
                  - iam:ListInstanceProfilesForRole
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicies
                  - iam:ListPolicyVersions
                  - iam:ListAttachedRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRolePolicies
                  - iam:TagPolicy
                  - iam:UntagPolicy
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:instance-profile/*e2b*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/*e2b*"
              - Sid: IAMAttachAWSManagedPolicy
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                Condition:
                  ArnEquals:
                    iam:PolicyARN:
                      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
                      - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
                      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
                      - arn:aws:iam::aws:policy/AmazonEC2FullAccess
                      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
                      - arn:aws:iam::aws:policy/AmazonS3FullAccess
                      - arn:aws:iam::aws:policy/SecretsManagerReadWrite
                      - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*e2b*"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - ec2.amazonaws.com
              - Sid: LogsAndMonitoring
                Effect: Allow
                Action:
                  - logs:*
                  - cloudwatch:*
                Resource: "*"
              - Sid: ElastiCacheAccess
                Effect: Allow
                Action:
                  - elasticache:DescribeCacheClusters
                  - elasticache:DescribeServerlessCaches
                Resource: "*"
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: "*"
              - Sid: SSMAccess
                Effect: Allow
                Action:
                  - ssm:GetParameter*
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DescribeParameters
                Resource: !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/*e2b*"
              - Sid: STSAccess
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
      Description: IAM role with complete permissions for E2B infrastructure deployment including Packer and Terraform

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2ServiceRole

# ===================================================================================================
# Outputs - Values exported after stack creation for reference by other stacks
# ===================================================================================================
Outputs:
  # Stack information
  CFNSTACKNAME:
    Description: CloudFormation stack name for reference in other templates
    Value: !Ref AWS::StackName
    Export:
      Name: CFNSTACKNAME

  # VPC outputs
  CFNVPCID:
    Description: VPC ID for the E2B infrastructure network
    Value: !Ref ExistingVpcId
    Export:
      Name: CFNVPCID

  CFNVPCCIDR:
    Description: VPC CIDR Block defining the overall network address space (automatically retrieved)
    Value: !GetAtt VpcCidrLookup.CidrBlock
    Export:
      Name: CFNVPCCIDR

  # Public Access Configuration
  CFNPUBLICACCESS:
    Description: Public or Private access configuration
    Value: !Ref PublicAccess
    Export:
      Name: CFNPUBLICACCESS

  # Subnet outputs
  CFNPRIVATESUBNET1:
    Description: Private Subnet ID in first availability zone for secure resources
    Value: !Ref ExistingPrivateSubnet1Id
    Export:
      Name: CFNPRIVATESUBNET1

  CFNPRIVATESUBNET2:
    Description: Private Subnet ID in second availability zone for secure resources
    Value: !Ref ExistingPrivateSubnet2Id
    Export:
      Name: CFNPRIVATESUBNET2

  CFNPUBLICSUBNET1:
    Description: Public Subnet ID in first availability zone for internet-facing resources
    Value: !Ref ExistingPublicSubnet1Id
    Export:
      Name: CFNPUBLICSUBNET1

  CFNPUBLICSUBNET2:
    Description: Public Subnet ID in second availability zone for internet-facing resources
    Value: !Ref ExistingPublicSubnet2Id
    Export:
      Name: CFNPUBLICSUBNET2

  # S3 bucket outputs
  CFNTERRAFORMBUCKET:
    Description: S3 bucket name for the unified E2B bucket
    Value: !Ref ExistingE2BBucketName
    Export:
      Name: CFNTERRAFORMBUCKET

  CFNLOKIBUCKET:
    Description: S3 bucket name for Loki log storage
    Value: !Ref ExistingLokiBucketName
    Export:
      Name: CFNLOKIBUCKET

  # SSH key output
  CFNSSHKEY:
    Description: EC2 SSH Key Name for cluster instance access
    Value: !Ref KeyName
    Export:
      Name: CFNSSHKEY

  # Database connection string
  CFNDBURL:
    Description: Complete PostgreSQL connection string for application configuration
    Value: !Ref ExistingDBURL
    Export:
      Name: CFNDBURL

  # Domain output
  CFNDOMAIN:
    Description: Base domain name for E2B services
    Value: !Ref BaseDomain
    Export:
      Name: CFNDOMAIN

  # Certificate output
  CFNCERTARN:
    Description: SSL Certificate ARN for HTTPS endpoints
    Value: !Ref ExistingCertificateArn
    Export:
      Name: CFNCERTARN

  # Redis output
  CFNREDISURL:
    Description: Redis endpoint address for application configuration
    Value: !Ref ExistingRedisEndpoint
    Export:
      Name: CFNREDISURL

  CLIENTINSTANCETYPE:
    Description: Instance type for client cluster
    Value: !If
      - HasCustomClientInstanceType
      - !Ref ClientInstanceType
      - !If
        - IsX64
        - c5.metal
        - c7g.metal
    Export:
      Name: CFNCLIENTINSTANCETYPE

  ENVIRONMENT:
    Description: E2B Environment
    Value: !Ref Environment
    Export:
      Name: CFNENVIRONMENT

  ARCHITECTURE:
    Description: E2B Cluster CPU Architecture
    Value: !Ref Architecture
    Export:
      Name: CFNARCHITECTURE

  CLIENTINSTANCETYPE:
    Description: Instance type for client cluster
    Value: !If
      - HasCustomClientInstanceType
      - !Ref ClientInstanceType
      - !If
        - IsX64
        - c5.metal
        - c7g.metal
    Export:
      Name: CFNCLIENTINSTANCETYPE

  REGION:
    Description: E2B Cluster Deployment Region
    Value: !Ref AWS::Region
    Export:
      Name: AWSREGION

  STACKNAME:
    Description: CloudFormation Stack Name
    Value: !Ref AWS::StackName
    Export:
      Name: AWSSTACKNAME

  CFNCustomScriptUrl:
    Description: Custom script URL for EC2 instances
    Value: !Ref CustomScriptUrl
    Export:
      Name: CFNCustomScriptUrl
